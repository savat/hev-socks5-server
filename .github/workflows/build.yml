name: "Build Android"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: armeabi-v7a
            abi: armeabi-v7a
          - name: arm64-v8a
            abi: arm64-v8a
          - name: x86
            abi: x86
          - name: x86_64
            abi: x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Setup Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r27d-linux.zip
          unzip -q android-ndk-r27d-linux.zip
          # ลบบรรทัดนี้ออก เพราะสร้าง symlink ไม่จำเป็น
          # ln -sf . jni

      - name: Build ${{ matrix.name }}
        run: |
          export NDK_HOME=$(pwd)/android-ndk-r27d
          chmod +x ./build-android.sh
          ./build-android.sh
        env:
          APP_ABI: ${{ matrix.abi }}

      - name: Upload artifact - ${{ matrix.name }}
        uses: actions/upload-artifact@v4
        with:
          name: hev-socks5-server-android-${{ matrix.name }}
          path: libs/${{ matrix.abi }}/libhev-socks5-server.so
          if-no-files-found: error
          retention-days: 30

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - android
    if: github.event_name == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: "hev-socks5-server-android-*"  # แก้ pattern ให้ตรงกับชื่อ artifact
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in release/*.so; do  # แก้ path ให้ตรง
            gh release upload ${{ github.event.release.tag_name }} "$i" --clobber
          done
