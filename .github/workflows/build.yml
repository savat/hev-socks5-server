name: "Build Android"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  android:
    name: Build Android ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: armeabi-v7a
            abi: armeabi-v7a
          - name: arm64-v8a
            abi: arm64-v8a
          - name: x86
            abi: x86
          - name: x86_64
            abi: x86_64
      fail-fast: false  # ถ้า ABI ใดล้มเหลว ก็ build ต่อ
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Setup Android NDK
        run: |
          echo "Downloading Android NDK r27d..."
          wget -q https://dl.google.com/android/repository/android-ndk-r27d-linux.zip
          echo "Extracting NDK..."
          unzip -q android-ndk-r27d-linux.zip
          echo "NDK setup completed at: $(pwd)/android-ndk-r27d"
        shell: bash

      - name: Build for ${{ matrix.name }}
        run: |
          export NDK_HOME=$(pwd)/android-ndk-r27d
          export APP_ABI=${{ matrix.abi }}
          
          echo "Building for ABI: $APP_ABI"
          echo "NDK_HOME: $NDK_HOME"
          
          chmod +x ./build-android.sh
          ./build-android.sh
        shell: bash

      - name: Debug - List generated files
        run: |
          echo "=== Directory structure ==="
          ls -la || echo "Empty directory"
          echo "=== libs directory ==="
          ls -la libs/ 2>/dev/null || echo "libs directory not found"
          echo "=== All .so files ==="
          find . -name "*.so" -type f 2>/dev/null || echo "No .so files found"
          echo "=== Target path check ==="
          if [ -f "libs/${{ matrix.abi }}/libhev-socks5-server.so" ]; then
            echo "✅ File exists at: libs/${{ matrix.abi }}/libhev-socks5-server.so"
            ls -la "libs/${{ matrix.abi }}/libhev-socks5-server.so"
          else
            echo "❌ File not found at: libs/${{ matrix.abi }}/libhev-socks5-server.so"
          fi
        shell: bash

      - name: Upload artifact - ${{ matrix.name }}
        uses: actions/upload-artifact@v4
        with:
          name: hev-socks5-server-android-${{ matrix.name }}
          path: libs/${{ matrix.abi }}/libhev-socks5-server.so
          if-no-files-found: error
          retention-days: 30

  release:
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    needs:
      - android
    if: github.event_name == 'release' && github.repository_owner == 'your-username'  # แก้ your-username ด้วย
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f
          echo "==========================="
        shell: bash

      - name: Prepare release files
        run: |
          mkdir -p release_files
          # คัดลอกไฟล์ .so ทั้งหมดมารวมกัน
          find artifacts -name "*.so" -exec cp {} release_files/ \;
          
          # เปลี่ยนชื่อไฟล์ให้ระบุ ABI
          cd release_files
          if [ -f "libhev-socks5-server.so" ]; then
            # ถ้ามีหลายไฟล์ต้องแยกตาม ABI
            echo "Renaming files to include ABI..."
          fi
          cd ..
          
          echo "=== Release files ==="
          ls -la release_files/
        shell: bash

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d "release_files" ] && [ "$(ls -A release_files)" ]; then
            for file in release_files/*.so; do
              if [ -f "$file" ]; then
                echo "Uploading: $file"
                gh release upload ${{ github.event.release.tag_name }} "$file" --clobber
              fi
            done
          else
            echo "No files to upload"
            exit 1
          fi
        shell: bash
